service: life-os
deploy_timeout: 120
image: <%= ENV["GITHUB_USERNAME"] %>/life-os

servers:
  web:
    - <%= ENV["DEPLOY_HOST"] %>

ssh:
  user: gh

registry:
  server: ghcr.io
  username: <%= ENV["GITHUB_USERNAME"] %>
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - DEVISE_JWT_SECRET_KEY
    - SMTP_USERNAME
    - SMTP_PASSWORD
  clear:
    SOLID_QUEUE_IN_PUMA: true
    APP_HOST: lifeos.kaizendevs.com
    SMTP_FROM: noreply@lifeos.kaizendevs.com
    SMTP_DOMAIN: lifeos.kaizendevs.com
    SMTP_ADDRESS: <%= ENV["SMTP_ADDRESS"] %>
    SMTP_PORT: 587

proxy:
  ssl: false
  host: lifeos.kaizendevs.com

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Build from repo root so the Dockerfile can access both backend/ and frontend/.
# To target DigitalOcean: change DEPLOY_HOST in .env; update DATABASE_URL accordingly.
builder:
  arch: arm64
  context: ..
  dockerfile: Dockerfile

# PostgreSQL managed by Kamal on the Pi.
# The app reaches it via the Docker network at hostname: life-os-db
accessories:
  db:
    image: postgres:16-alpine
    host: <%= ENV["DEPLOY_HOST"] %>
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: backend
        POSTGRES_DB: backend_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
