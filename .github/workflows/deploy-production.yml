name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type "production" to confirm
        required: true

jobs:
  deploy:
    name: Deploy to lifeos.kaizendevs.com
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'production'

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1.299.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: backend

      - name: Set up SSH via Cloudflare Tunnel
        run: |
          curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg | sudo tee /usr/share/keyrings/cloudflare-main.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared any main" | sudo tee /etc/apt/sources.list.d/cloudflared.list
          sudo apt-get update -qq && sudo apt-get install -y cloudflared

          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          cat >> ~/.ssh/config << 'EOF'
          Host ssh.lifeos.kaizendevs.com
            ProxyCommand cloudflared access tcp --hostname %h
            StrictHostKeyChecking no
            User gh
          EOF

      - name: Deploy
        working-directory: backend
        env:
          GITHUB_USERNAME: ${{ secrets.GH_USERNAME }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DEVISE_JWT_SECRET_KEY: ${{ secrets.DEVISE_JWT_SECRET_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          APP_VERSION: ${{ github.ref_name }}
        run: bundle exec kamal deploy --skip-push
